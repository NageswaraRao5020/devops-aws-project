 <!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body{
            font-family: Arial;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .login-box{
            background:#1e293b;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
            border:none;
            border-radius:8px;
        }

        button{
            width:95%;
            padding:12px;
            background:#38bdf8;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0284c7;
        }

        h1{
            color:#38bdf8;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>Admin Login</h1>

        <form method="POST" action="/login">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
