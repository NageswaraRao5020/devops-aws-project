<!DOCTYPE html>
<html>
<head>
    <title>Consultancy Check-In</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #07152f;
            color: white;
        }

        .container {
            width: 520px;
            margin: 45px auto;
            background: #1d2b4a;
            padding: 35px;
            border-radius: 22px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            color: #42bfff;
            margin-bottom: 25px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #42bfff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #1ca9f0;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #42bfff;
            text-decoration: none;
            margin: 0 12px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Consultancy Check-In</h1>

        <form action="/submit" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="Email">

            <input type="text" name="phone" placeholder="Phone Number" required>

            <select name="service_type" required>
                <option value="">Select Service Type</option>
                <option>Job Consultation</option>
                <option>Resume Help</option>
                <option>Immigration Support</option>
                <option>Training Inquiry</option>
                <option>Interview Preparation</option>
                <option>Document Submission</option>
                <option>Other</option>
            </select>

            <select name="appointment_type" required>
                <option value="">Appointment Type</option>
                <option>Walk-In</option>
                <option>Scheduled Appointment</option>
                <option>Follow-Up</option>
            </select>

            <input type="text" name="consultant" placeholder="Consultant / Staff to Meet">

            <textarea name="reason" placeholder="Reason / Notes"></textarea>

            <button type="submit">Generate Token & Check In</button>

        </form>

        <div class="links">
            <a href="/admin">Admin Dashboard</a>
            <a href="/logout">Logout</a>
        </div>

    </div>

</body>
</html>
