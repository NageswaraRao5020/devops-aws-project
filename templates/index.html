<!DOCTYPE html>
<html>
<head>
    <title>DevOps AWS Project</title>

    <style>
        body{
            background-color:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        h1{
            font-size:50px;
            color:#38bdf8;
        }

        p{
            font-size:22px;
        }

        .box{

            border-radius:10px;

<body>

    <div class="box">
        <h1>DevOps + AWS Project</h1>

</html>
